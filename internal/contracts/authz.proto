syntax = "proto3";

package workflow.plugins.authz.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/GoCodeAlone/workflow-plugin-authz/internal/contracts";

message StringList {
  repeated string values = 1;
}

message AdapterConfig {
  string type = 1;
  string path = 2;
  string driver = 3;
  string dsn = 4;
  string table_name = 5;
  string tenant = 6;
  string filter_field = 7;
  string filter_value = 8;
}

message WatcherConfig {
  string type = 1;
  string interval = 2;
}

message CasbinModuleConfig {
  string model = 1;
  repeated StringList policies = 2;
  repeated StringList role_assignments = 3;
  AdapterConfig adapter = 4;
  WatcherConfig watcher = 5;
}

message PermitModuleConfig {
  string api_key = 1;
  string pdp_url = 2;
  string api_url = 3;
  string project = 4;
  string environment = 5;
}

message ExtraField {
  string key = 1;
  string value = 2;
}

message AuthzCheckConfig {
  string module = 1;
  string subject_key = 2;
  string object = 3;
  string action = 4;
  bool audit = 5;
  repeated ExtraField extra_fields = 6;
}

message AuthzCheckInput {
  string module = 1;
  string subject_key = 2;
  string subject = 3;
  string object = 4;
  string action = 5;
  repeated ExtraField extra_fields = 6;
}

message AuthzCheckOutput {
  string subject = 1;
  string object = 2;
  string action = 3;
  bool allowed = 4;
  int32 response_status = 5;
  string response_body = 6;
  google.protobuf.Struct response_headers = 7;
  string error = 100;
}

message PolicyRuleConfig {
  string module = 1;
  repeated string rule = 2;
}

message PolicyRuleInput {
  string module = 1;
  repeated string rule = 2;
}

message PolicyRuleOutput {
  bool changed = 1;
  repeated string rule = 2;
  string error = 100;
}

message RoleAssignConfig {
  string module = 1;
  string action = 2;
  repeated StringList assignments = 3;
}

message RoleAssignInput {
  string module = 1;
  string action = 2;
  repeated StringList assignments = 3;
}

message RoleAssignOutput {
  string action = 1;
  repeated StringList assignments = 2;
  string error = 100;
}

message CapabilitiesConfig {
  string module = 1;
  string provider = 2;
}

message CapabilitiesInput {
  string module = 1;
  string provider = 2;
}

message CapabilitiesOutput {
  string module = 1;
  string provider = 2;
  repeated string capabilities = 3;
  string error = 100;
}

message SubjectObjectActionConfig {
  string module = 1;
  string subject = 2;
  string object = 3;
  string action = 4;
}

message SubjectObjectActionInput {
  string module = 1;
  string subject = 2;
  string object = 3;
  string action = 4;
}

message SubjectObjectActionOutput {
  bool allowed = 1;
  bool changed = 2;
  string subject = 3;
  string object = 4;
  string action = 5;
  string error = 100;
}

message ListConfig {
  string module = 1;
  string filter = 2;
  string value = 3;
}

message ListInput {
  string module = 1;
  string filter = 2;
  string value = 3;
}

message GenericStepOutput {
  google.protobuf.Struct output = 1;
  string error = 100;
}

message RelationConfig {
  string module = 1;
  string subject = 2;
  string relation = 3;
  string object = 4;
}

message RelationInput {
  string module = 1;
  string subject = 2;
  string relation = 3;
  string object = 4;
}

message RelationOutput {
  bool changed = 1;
  string subject = 2;
  string relation = 3;
  string object = 4;
  string error = 100;
}

message PermitStepConfig {
  string module = 1;
  google.protobuf.Struct values = 2;
}

message PermitStepInput {
  string module = 1;
  google.protobuf.Struct values = 2;
}
