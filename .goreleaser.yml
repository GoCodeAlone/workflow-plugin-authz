version: 2

builds:
  - main: "./cmd/{{ .ProjectName }}"
    binary: "{{ .ProjectName }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
