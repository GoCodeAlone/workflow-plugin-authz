version: 2

builds:
  - main: ./cmd/workflow-plugin-authz
    binary: workflow-plugin-authz
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
